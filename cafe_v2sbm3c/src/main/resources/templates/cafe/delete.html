<!DOCTYPE html>

<html layout:decorate="~{layout}"> <!-- layout.html 상속-->
<div layout:fragment="content">
  <div class='title_line'>
    카테고리 > 
    <span th:text="${cafeVO.name}" class="title_line_text"></span >
    
    <span th:if="${cafeVO.namesub != '-'}" th:text="' > ' + ${cafeVO.namesub}" class="title_line_text"></span>
    
    삭제
  </div>
  <div id='panel_delete' style='padding: 10px 0px 10px 0px; background-color: #F9F9F9; width: 100%; text-align: center;'>

    <form name="frm" th:object="${cafeVO}" method="post" action="/cafe/delete">
      <input type="hidden" name="cafeno" th:value="${cafeVO.cafeno}">
  
      <div class="msg_warning">카테고리를 삭제하면 복구 할 수 없습니다.</div>
      <label>카테고리 이름</label>: <span th:text="${cafeVO.name}"></span>
      
       - <span th:text="${cafeVO.namesub}"></span>
      
      <div class="content_body_bottom">
        <button type="submit" class="btn btn-secondary btn-sm">삭제</button>
        <button type="button" onclick="location.href='/cafe/list_all'" class="btn btn-secondary btn-sm">목록(취소)</button>
      </div>
    </form>  
      <table class="table table-hover">
    <colgroup>
      <col style='width: 10%;'/>
      <col style='width: 20%;'/>
      <col style='width: 20%;'/>
      <col style='width: 10%;'/>    
      <col style='width: 20%;'/>
      <col style='width: 20%;'/>
    </colgroup>
    <thead>
      <tr>
        <th class="th_bs">순서</th>
        <th class="th_bs">지역명</th>
        <th class="th_bs">카페명</th>
        <th class="th_bs">자료수</th>
        <th class="th_bs">등록일</th>
        <th class="th_bs">기타</th>
      </tr>
    </thead>
    <tbody>
      <tr th:each="cafeVO:${list}">
        <td class="td_bs" th:text="${cafeVO.cafeno}"></td>
        <td class="td_bs"><a th:href="@{|/cafe//read/${cafeVO.cafeno}|}" style="display: block;" th:text="${cafeVO.name}"></a></td>
        <td class="td_bs"><a th:href="@{|/cafe/read/${cafeVO.cafeno}|}" style="display: block;" th:text="${cafeVO.namesub}"></a></td>
        <td class="td_bs" th:text="${cafeVO.cnt}"></td>
        <td class="td_bs" th:text="${cafeVO.rdate.substring(0, 10)}"></td>
        <td class="td_bs">
          <img src="/cafe/images/show.png" class="icon"> 
          <img src="/cafe/images/decrease.png" class="icon">
          <img src="/cafe/images/increase.png" class="icon">
          <a th:href="@{|/cafe/update/${cafeVO.cafeno}|}"><img src="/cafe/images/update.png" class="icon"></a>
          <a th:href="@{|/cafe/delete/${cafeVO.cafeno}|}"><img src="/cafe/images/delete.png" class="icon"></a>
        </td>
      </tr>
    </tbody>
  </table>
 
  </div>  
  
</div>
</html>
