<!DOCTYPE html>

<html layout:decorate="~{layout}"> <!-- layout.html 상속-->
<div layout:fragment="content">

    <div class="title_line">카테고리 조회</div>
  <aside class="aside_right">
  <a href="/cate/list_all">목록</a>
  <span class="menu_divide">│</span>
  <a th:href="@{|/cafe/update/${cafeVO.cafeno}|}">수정</a>
  <span class="menu_divide">│</span>
  <a th:href="@{|/cafe/delete/${cafeVO.cafeno}|}">삭제</a>
  <span class="menu_divide">│</span>
  <a href="/cafe/list_all">등록</a>
  <span class="menu_divide">│</span>
    <a href="javascript: location.reload();">새로 고침</a>
  </aside>
  <div class="menu_line"></div>
  
  <div class="container mt-3">
    <ul class="list-group list-group-flush">
      <li class="list-group-item">번호: <span th:text="${cafeVO.cafeno}"></span></li>
      <li class="list-group-item">지역명: <span th:text="${cafeVO.name}"></span></li>
      <li class="list-group-item">카페명: <span th:text="${cafeVO.namesub}"></span></li>
      <li class="list-group-item">관련 자료수: <span th:text="${cafeVO.cnt}"></span></li>
      <li class="list-group-item">등록일: <span th:text="${cafeVO.rdate}"></span></li>
      <li class="list-group-item">출력 순서: <span th:text="${cafeVO.seqno}"></span></li>
      <li class="list-group-item">출력 모드: <span th:text="${cafeVO.visible}"></span></li>
    </ul>  
  </div>

  <div class="content_body_bottom">
    <button type="button" onclick="location.href='/cafe/list_all'" class="btn btn-secondary btn-sm">목록</button>
    <button type="button" th:attr="onclick=|location.href='/cafe/update/${cafeVO.cafeno}'|" class="btn btn-secondary btn-sm">수정</button>
    <button type="button" th:attr="onclick=|location.href='/cafe/delete/${cafeVO.cafeno}'|" class="btn btn-secondary btn-sm">삭제</button>
    <button type="button" onclick="location.href='/cafe/create'" class="btn btn-secondary btn-sm">등록</button>
  </div>
  
    <table class="table table-hover">
    <colgroup>
      <col style='width: 10%;'/>
      <col style='width: 20%;'/>
      <col style='width: 20%;'/>
      <col style='width: 10%;'/>    
      <col style='width: 20%;'/>
      <col style='width: 20%;'/>
    </colgroup>
    <thead>
      <tr>
        <th class="th_bs">순서</th>
        <th class="th_bs">지역명</th>
        <th class="th_bs">카페명</th>
        <th class="th_bs">자료수</th>
        <th class="th_bs">등록일</th>
        <th class="th_bs">기타</th>
      </tr>
    </thead>
    <tbody>
      <tr th:each="cafeVO:${list}">
        <td class="td_bs" th:text="${cafeVO.cafeno}"></td>
        <td class="td_bs"><a th:href="@{|/cafe/read/${cafeVO.cafeno}|}" style="display: block;" th:text="${cafeVO.name}"></a></td>
        <td class="td_bs"><a th:href="@{|/cafe/read/${cafeVO.cafeno}|}" style="display: block;" th:text="${cafeVO.namesub}"></a></td>
        <td class="td_bs" th:text="${cafeVO.cnt}"></td>
        <td class="td_bs" th:text="${cafeVO.rdate.substring(0, 10)}"></td>
        <td class="td_bs">
          <img src="/cafe/images/show.png" class="icon"> 
          <img src="/cafe/images/decrease.png" class="icon">
          <img src="/cafe/images/increase.png" class="icon">
          <a th:href="@{|/cafe/update/${cafeVO.cafeno}|}"><img src="/cafe/images/update.png" class="icon"></a>
          <a th:href="@{|/cafe/delete/${cafeVO.cafeno}|}"><img src="/cafe/images/delete.png" class="icon"></a>
        </td>
      </tr>
    </tbody>
  </table>
  
</div>
</html>
